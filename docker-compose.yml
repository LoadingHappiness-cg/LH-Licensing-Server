services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lh_licensing_server
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lh_licensing_server"]
      interval: 5s
      timeout: 3s
      retries: 20
